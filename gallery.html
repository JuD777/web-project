    <script>
      (function () {
        var dropdown = document.getElementById("nav-gallery-dropdown");
        if (!dropdown) return;
        var trigger = dropdown.querySelector(".gallery-nav-trigger");
        var menu = dropdown.querySelector(".dropdown-menu");
        if (!trigger || !menu) return;

        function isNoHoverPrimary() {
          return window.matchMedia("(hover: none)").matches;
        }

        function setOpen(open) {
          dropdown.classList.toggle("is-open", open);
          trigger.setAttribute("aria-expanded", open ? "true" : "false");
        }

        trigger.addEventListener("click", function (e) {
          if (!isNoHoverPrimary()) return;
          if (dropdown.classList.contains("is-open")) {
            setOpen(false);
            return;
          }
          e.preventDefault();
          setOpen(true);
        });

        menu.querySelectorAll("a").forEach(function (link) {
          link.addEventListener("click", function () {
            setOpen(false);
          });
        });

        document.addEventListener("click", function (e) {
          if (!dropdown.classList.contains("is-open")) return;
          if (!dropdown.contains(e.target)) setOpen(false);
        });

        window
          .matchMedia("(hover: none)")
          .addEventListener("change", function (ev) {
            if (!ev.matches) setOpen(false);
          });
      })();
    </script>
    <script>
      (function () {
        var lb = document.getElementById("lightbox");
        if (!lb) return;
        var fullImg = lb.querySelector(".lightbox-img");
        var closeBtn = lb.querySelector(".lightbox-close");
        if (!fullImg || !closeBtn) return;

        var lastFocus = null;

        function openLightbox(thumb) {
          lastFocus = document.activeElement;
          fullImg.src = thumb.currentSrc || thumb.src;
          fullImg.alt = thumb.alt || "";
          lb.hidden = false;
          document.body.style.overflow = "hidden";
          closeBtn.focus();
        }

        function closeLightbox() {
          lb.hidden = true;
          fullImg.removeAttribute("src");
          fullImg.alt = "";
          document.body.style.overflow = "";
          if (lastFocus && typeof lastFocus.focus === "function") {
            lastFocus.focus();
          }
        }

        document.querySelectorAll(".gallery-wrap .gallery-item img").forEach(
          function (img) {
            img.addEventListener("click", function () {
              openLightbox(img);
            });
          }
        );

        closeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeLightbox();
        });

        lb.addEventListener("click", function (e) {
          if (e.target === lb) closeLightbox();
        });

        fullImg.addEventListener("click", function (e) {
          e.stopPropagation();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && !lb.hidden) closeLightbox();
        });
      })();
    </script>
