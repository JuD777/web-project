<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Yigong Hair Stylist</title>

    <style>
      @import url("https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap");

      :root {
        --bg: #4f5254;
        --surface: #62686c;
        --text: #e6e6e6;
        --muted: #aaaaaa;
        --line: #2a2a2a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Satoshi", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        position: fixed;
        top: 0;
        width: 100%;
        background: var(--bg);
        z-index: 10;
      }

      .header-inner {
        width: 100%;
        margin: 0;
        padding: clamp(16px, 2.2vw, 26px) clamp(14px, 2vw, 24px);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-weight: 700;
        font-size: clamp(1.35rem, 3vw, 2.5rem);
        margin-left: clamp(10px, 4vw, 60px);
        color: var(--text);
        text-decoration: none;
      }

      nav {
        margin-right: clamp(10px, 4vw, 60px);
      }

      nav a {
        color: var(--muted);
        text-decoration: none;
        margin-left: clamp(12px, 2vw, 30px);
        font-size: clamp(0.9rem, 1.4vw, 1.12rem);
      }

      nav a:hover,
      nav a.active {
        color: var(--text);
      }

      main {
        width: 100%;
        padding: 120px 24px 60px;
      }

      .gallery-wrap {
        background: #676d70;
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        padding: 40px;
      }

      .gallery-title {
        margin: 0 0 20px;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .gallery-item {
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        min-height: 240px;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #c5c5c5;
        font-size: 0.95rem;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="logo" href="./index.html">Yigong</a>
        <nav>
          <a href="./index.html#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="gallery-wrap">
        <h1 class="gallery-title">Gallery</h1>
        <div class="gallery-grid">
          <article class="gallery-item">
            <img src="./images/home.jpeg" alt="Hair styling sample 1" />
          </article>
          <article class="gallery-item">
            <div class="placeholder">Add image 2</div>
          </article>
          <article class="gallery-item">
            <div class="placeholder">Add image 3</div>
          </article>
          <article class="gallery-item">
            <div class="placeholder">Add image 4</div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
